name: Build Android APK
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: 22  # <--- UPDATED THIS LINE
      - run: cd nsu-audit-engine/webapp && npm install && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_NSU_API_KEY: ${{ secrets.VITE_NSU_API_KEY }}
      - run: cd nsu-audit-engine/webapp && npx cap sync android
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - run: cd nsu-audit-engine/webapp/android && chmod +x ./gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: NSU-App, path: nsu-audit-engine/webapp/android/app/build/outputs/apk/debug/app-debug.apk }
