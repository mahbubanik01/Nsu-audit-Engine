name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['nsu-audit-engine/webapp/**']

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./nsu-audit-engine/webapp

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js (V22 required by Capacitor 7)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './nsu-audit-engine/webapp/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Web App
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_NSU_API_KEY: ${{ secrets.VITE_NSU_API_KEY }}
        run: npm run build
        
      - name: Sync Capacitor Android
        run: npx cap sync android
        
      - name: Setup Java JDK (V21 required for modern Android builds)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Debug APK
        working-directory: ./nsu-audit-engine/webapp/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NSU-Audit-Engine-Final
          path: nsu-audit-engine/webapp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
